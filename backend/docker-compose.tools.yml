version: '3.8'

services:
  # Redis for caching (if needed)
  redis:
    image: redis:7-alpine
    container_name: school_backend_redis
    ports:
      - "6379:6379"
    networks:
      - school_network
    profiles:
      - tools

  # pgAdmin - PostgreSQL Admin UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: school_backend_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@school.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - school_network
    profiles:
      - tools

networks:
  school_network:
    driver: bridge